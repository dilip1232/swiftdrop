name: Windows Build

on:
  push:
    branches: [feature/windows-support]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build SwiftDrop for Windows
        working-directory: swiftdrop/swiftdrop-windows
        run: |
          go mod tidy
          go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Headless smoke test
        working-directory: swiftdrop/swiftdrop-windows
        run: |
          Start-Process -NoNewWindow -FilePath .\SwiftDrop.exe -ArgumentList "-headless"
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri "http://localhost:53317/health" -UseBasicParsing
          if ($response.Content -ne "ok") { throw "Health check failed" }
          Stop-Process -Name SwiftDrop -Force -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: SwiftDrop-Windows
          path: swiftdrop/swiftdrop-windows/SwiftDrop.exe
