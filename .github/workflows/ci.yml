name: CI

on:
  push:
    branches: [dev, feature/*]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Verify UI build is committed ──
  ui-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify platform UI dirs exist and match
        run: |
          fail=0
          for dir in mac linux windows; do
            if [ ! -f "$dir/ui/index.html" ]; then
              echo "❌ $dir/ui/index.html missing — run 'npm run build' in ui/ and sync"
              fail=1
            fi
          done
          # All three platform dirs should have identical content
          if ! diff -rq mac/ui linux/ui >/dev/null 2>&1; then
            echo "❌ mac/ui and linux/ui differ"
            fail=1
          fi
          if ! diff -rq mac/ui windows/ui >/dev/null 2>&1; then
            echo "❌ mac/ui and windows/ui differ"
            fail=1
          fi
          [ $fail -eq 0 ] && echo "✅ All platform ui/ dirs present and in sync"
          exit $fail

  # ── Build & test Go core ──
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: core/go.mod

      - name: Build core
        working-directory: core
        run: go build ./...

      - name: Test core
        working-directory: core
        run: go test ./...

  # ── Build macOS app ──
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: mac/go.mod

      - name: Build mac
        working-directory: mac
        run: go build -o swiftdrop .

      - uses: actions/upload-artifact@v7
        with:
          name: swiftdrop-mac
          path: mac/swiftdrop

  # ── Build Windows app ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: windows/go.mod

      - name: Build SwiftDrop.exe
        working-directory: windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - uses: actions/upload-artifact@v7
        with:
          name: swiftdrop-windows
          path: windows/SwiftDrop.exe

      - name: Headless smoke test
        working-directory: windows
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath .\SwiftDrop.exe -ArgumentList "-headless"
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:53317/api/me" -UseBasicParsing
            Write-Host "Health check passed: $($response.Content)"
          } finally {
            Stop-Process -Name SwiftDrop -Force -ErrorAction SilentlyContinue
          }

  # ── Build Linux app ──
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: linux/go.mod

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build linux
        working-directory: linux
        run: go build -o swiftdrop .

      - uses: actions/upload-artifact@v7
        with:
          name: swiftdrop-linux
          path: linux/swiftdrop

  # ── Build Android app ──
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v7
        with:
          name: swiftdrop-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
