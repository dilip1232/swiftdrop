name: Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: swiftdrop-mac

      - uses: actions/checkout@v4
        with:
          repository: dilip1232/swiftdrop-core
          ref: dev
          path: swiftdrop-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: swiftdrop-mac/go.mod

      - name: Build DMG
        working-directory: swiftdrop-mac
        run: |
          chmod +x build-dmg.sh
          ./build-dmg.sh

      - name: Rename DMG with version
        working-directory: swiftdrop-mac
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv SwiftDrop.dmg SwiftDrop-${VERSION}.dmg

      - name: Get changelog from PR
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(gh pr list --base main --head "release/${VERSION}" --state merged --json body --jq '.[0].body' || echo "")
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: swiftdrop-mac/SwiftDrop-*.dmg
