name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Extract version from branch name ──
  version:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"

  # ── Build macOS DMG ──
  build-mac:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mac/go.mod

      - name: Build DMG
        working-directory: mac
        run: |
          chmod +x build-dmg.sh
          ./build-dmg.sh

      - name: Rename DMG with version
        working-directory: mac
        run: mv SwiftDrop.dmg SwiftDrop-${{ needs.version.outputs.version_num }}.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: mac/SwiftDrop-*.dmg

  # ── Build Windows EXE ──
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: windows/go.mod

      - name: Build SwiftDrop.exe
        working-directory: windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Rename with version
        working-directory: windows
        shell: pwsh
        run: Copy-Item SwiftDrop.exe "SwiftDrop-Windows-${{ needs.version.outputs.version_num }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/SwiftDrop-Windows-*.exe

  # ── Build Linux binary ──
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: linux/go.mod

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build SwiftDrop
        working-directory: linux
        run: go build -ldflags "-s -w" -o SwiftDrop .

      - name: Package tar.gz
        working-directory: linux
        run: tar czf SwiftDrop-Linux-${{ needs.version.outputs.version_num }}.tar.gz SwiftDrop

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: linux/SwiftDrop-Linux-*.tar.gz

  # ── Build Android APK ──
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore release-keystore.jks \
            -alias swiftdrop \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -dname "CN=SwiftDrop, OU=Dev, O=SwiftDrop, L=Unknown, ST=Unknown, C=US"

      - name: Set version from tag
        working-directory: android
        run: |
          VERSION="${{ needs.version.outputs.version_num }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode = .*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Set versionName=$VERSION versionCode=$CODE"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pswiftdrop.storeFile="$(pwd)/../release-keystore.jks" \
            -Pswiftdrop.storePassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -Pswiftdrop.keyAlias=swiftdrop \
            -Pswiftdrop.keyPassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}"

      - name: Rename APK with version
        run: cp android/app/build/outputs/apk/release/app-release.apk SwiftDrop-${{ needs.version.outputs.version_num }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: SwiftDrop-*.apk

  # ── Create tag & GitHub Release with all assets ──
  release:
    needs: [version, build-mac, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "Release ${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          files: artifacts/*
