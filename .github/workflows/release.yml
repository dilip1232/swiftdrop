name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Read version from VERSION file ──
  version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
    steps:
      - uses: actions/checkout@v6
      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing $VERSION"

  # ── Build macOS DMG ──
  build-mac:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: mac/go.mod

      - name: Build DMG
        working-directory: mac
        run: |
          chmod +x build-dmg.sh
          ./build-dmg.sh

      - name: Rename DMG with version
        working-directory: mac
        run: mv SwiftDrop.dmg SwiftDrop-macOS-${{ needs.version.outputs.version_num }}.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: mac/SwiftDrop-macOS-*.dmg

  # ── Build Windows EXE ──
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: windows/go.mod

      - name: Build SwiftDrop.exe
        working-directory: windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Rename with version
        working-directory: windows
        shell: pwsh
        run: Copy-Item SwiftDrop.exe "SwiftDrop-Windows-${{ needs.version.outputs.version_num }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/SwiftDrop-Windows-*.exe

  # ── Build Linux packages (tar.gz, .deb, .rpm, AppImage) ──
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: linux/go.mod

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev rpm libfuse2

      - name: Build SwiftDrop
        working-directory: linux
        run: go build -ldflags "-s -w" -o swiftdrop .

      - name: Package tar.gz
        working-directory: linux
        run: tar czf SwiftDrop-Linux-${{ needs.version.outputs.version_num }}.tar.gz swiftdrop

      - name: Build .deb
        run: |
          VERSION=${{ needs.version.outputs.version_num }}
          PKG=swiftdrop_${VERSION}_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          cp linux/swiftdrop $PKG/usr/bin/swiftdrop
          cp linux/swiftdrop.desktop $PKG/usr/share/applications/
          cp linux/swiftdrop.png $PKG/usr/share/icons/hicolor/256x256/apps/
          cat > $PKG/DEBIAN/control <<EOF
          Package: swiftdrop
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libwebkitgtk-6.0-4
          Maintainer: SwiftDrop <dev@swiftdrop.app>
          Description: Fast LAN file transfer
           Send files, folders & messages across your devices at full LAN speed.
           Encrypted, private, no limits.
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' $PKG/DEBIAN/control
          dpkg-deb --build $PKG
          mv ${PKG}.deb SwiftDrop-Linux-${VERSION}.deb

      - name: Build .rpm
        run: |
          VERSION=${{ needs.version.outputs.version_num }}
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cat > rpmbuild/SPECS/swiftdrop.spec <<'SPEC'
          Name:    swiftdrop
          Version: VERSION_PLACEHOLDER
          Release: 1
          Summary: Fast LAN file transfer
          License: GPLv3
          URL:     https://github.com/dilip1232/swiftdrop

          %description
          Send files, folders & messages across your devices at full LAN speed.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp %{_sourcedir}/swiftdrop %{buildroot}/usr/bin/swiftdrop
          cp %{_sourcedir}/swiftdrop.desktop %{buildroot}/usr/share/applications/
          cp %{_sourcedir}/swiftdrop.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/

          %files
          /usr/bin/swiftdrop
          /usr/share/applications/swiftdrop.desktop
          /usr/share/icons/hicolor/256x256/apps/swiftdrop.png
          SPEC
          sed -i 's/^          //' rpmbuild/SPECS/swiftdrop.spec
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" rpmbuild/SPECS/swiftdrop.spec
          cp linux/swiftdrop rpmbuild/SOURCES/
          cp linux/swiftdrop.desktop rpmbuild/SOURCES/
          cp linux/swiftdrop.png rpmbuild/SOURCES/
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/swiftdrop.spec
          cp rpmbuild/RPMS/x86_64/*.rpm SwiftDrop-Linux-${VERSION}.rpm

      - name: Build AppImage
        run: |
          VERSION=${{ needs.version.outputs.version_num }}
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable linux/swiftdrop \
            --desktop-file linux/swiftdrop.desktop \
            --icon-file linux/swiftdrop.png \
            --output appimage
          mv SwiftDrop*.AppImage SwiftDrop-Linux-${VERSION}.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            linux/SwiftDrop-Linux-*.tar.gz
            SwiftDrop-Linux-*.deb
            SwiftDrop-Linux-*.rpm
            SwiftDrop-Linux-*.AppImage

  # ── Build Android APK ──
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
          # Verify the keystore is valid
          keytool -list -keystore release-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias swiftdrop

      - name: Set version from tag
        working-directory: android
        run: |
          VERSION="${{ needs.version.outputs.version_num }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode = .*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Set versionName=$VERSION versionCode=$CODE"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pswiftdrop.storeFile="$(pwd)/../release-keystore.jks" \
            -Pswiftdrop.storePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pswiftdrop.keyAlias=swiftdrop \
            -Pswiftdrop.keyPassword="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Rename APK with version
        run: cp android/app/build/outputs/apk/release/app-release.apk SwiftDrop-Android-${{ needs.version.outputs.version_num }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: SwiftDrop-Android-*.apk

  # ── Create tag & GitHub Release with all assets ──
  release:
    needs: [version, build-mac, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "Release ${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          files: artifacts/*

  # ── Rebase dev onto main after release ──
  rebase-dev:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase dev onto main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout dev
          git rebase main
          git push origin dev --force-with-lease
