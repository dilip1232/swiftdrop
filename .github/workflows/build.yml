name: Build Desktop Apps

on:
  push:
    branches: [feature/svelte-ui, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: windows/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build Windows exe
        working-directory: windows
        run: go build -ldflags="-s -w -H windowsgui" -o SwiftDrop.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: swiftdrop-windows
          path: windows/SwiftDrop.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: linux/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libfuse2

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build Linux binary
        working-directory: linux
        run: go build -ldflags="-s -w" -o swiftdrop .

      - name: Create AppImage structure
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp linux/swiftdrop AppDir/usr/bin/
          cp linux/swiftdrop.desktop AppDir/usr/share/applications/swiftdrop.desktop
          cp linux/swiftdrop.desktop AppDir/swiftdrop.desktop
          cp linux/swiftdrop.png AppDir/usr/share/icons/hicolor/256x256/apps/swiftdrop.png
          cp linux/swiftdrop.png AppDir/swiftdrop.png
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/usr/bin/swiftdrop" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: ARCH=x86_64 ./appimagetool --appimage-extract-and-run --no-appstream AppDir SwiftDrop-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: swiftdrop-linux
          path: |
            SwiftDrop-x86_64.AppImage
            linux/swiftdrop
