name: Build

on:
  push:
    branches: [main, dev, feature/*]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: swiftdrop-windows

      - uses: actions/checkout@v4
        with:
          repository: dilip1232/swiftdrop-core
          ref: dev
          path: swiftdrop-core

      - uses: actions/setup-go@v5
        with:
          go-version-file: swiftdrop-windows/go.mod

      - name: Build SwiftDrop.exe
        working-directory: swiftdrop-windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Headless smoke test
        working-directory: swiftdrop-windows
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath .\SwiftDrop.exe -ArgumentList "-headless"
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:53317/api/me" -UseBasicParsing
            Write-Host "Health check passed: $($response.Content)"
          } finally {
            Stop-Process -Name SwiftDrop -Force -ErrorAction SilentlyContinue
          }

      - uses: actions/upload-artifact@v4
        with:
          name: SwiftDrop-Windows
          path: swiftdrop-windows/SwiftDrop.exe
